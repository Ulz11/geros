<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GerOS — Camp Management</title>
<style>
  :root{
    --bg:#f3f1ea; --card:#ffffff; --ink:#1c1b18; --muted:#76726a;
    --line:#e7e3d9; --accent:#2e7d6f; --accent-ink:#1d5a4f;
    --green:#2faa5a; --green-bg:#e7f6ec;
    --red:#d9534f; --red-bg:#fbeceb;
    --amber:#e8a13c; --amber-bg:#fcf3e2;
    --blue:#3a7bd5; --shadow:0 1px 2px rgba(20,18,12,.05),0 8px 24px rgba(20,18,12,.06);
    --r:18px; --r-sm:12px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .hidden{display:none !important}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:
    radial-gradient(120% 120% at 80% 0%, #e9efe9 0%, var(--bg) 55%);}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    width:380px;padding:34px 30px;text-align:center}
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);position:relative;flex:none}
  .logo:before{content:"";position:absolute;inset:7px 6px;border-bottom:3px solid #fff;border-radius:0 0 2px 2px}
  .logo:after{content:"";position:absolute;left:8px;right:8px;top:9px;height:9px;background:#fff;
    clip-path:polygon(50% 0,100% 100%,0 100%)}
  .brand h1{font-size:21px;margin:0;letter-spacing:-.3px}
  .login-card p{color:var(--muted);margin:2px 0 22px;font-size:13px}
  .roles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .role-btn{border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:left;background:#fff;
    transition:.15s;display:flex;flex-direction:column;gap:2px}
  .role-btn:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow)}
  .role-btn .rn{font-weight:600;font-size:14px}
  .role-btn .rd{font-size:11.5px;color:var(--muted)}
  .role-btn .av{font-size:11px;margin-top:6px;color:var(--accent-ink);font-weight:600}
  .lang-pill{position:fixed;top:18px;right:20px;background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:5px;display:flex;gap:2px;box-shadow:var(--shadow);z-index:50}
  .lang-pill button{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--muted)}
  .lang-pill button.on{background:var(--accent);color:#fff}

  /* ---------- App shell ---------- */
  #app{display:none;height:100%}
  .layout{display:grid;grid-template-columns:226px 1fr;height:100%}
  aside{background:#fbfaf6;border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:4px}
  .side-brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px}
  .side-brand .logo{width:28px;height:28px}
  .side-brand b{font-size:16px;letter-spacing:-.2px}
  .nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;color:var(--muted);
    font-weight:500;font-size:13.5px}
  .nav-i:hover{background:#f0ede4;color:var(--ink)}
  .nav-i.on{background:#fff;color:var(--ink);box-shadow:var(--shadow);font-weight:600}
  .nav-i .ic{width:18px;text-align:center;font-size:15px;flex:none}
  .nav-sp{flex:1}
  .userbox{border-top:1px solid var(--line);padding-top:12px;margin-top:6px}
  .userbox .who{display:flex;align-items:center;gap:9px;padding:4px 8px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
  .userbox .nm{font-weight:600;font-size:13px}.userbox .rl{font-size:11px;color:var(--muted)}
  .logout{font-size:12px;color:var(--muted);padding:6px 8px;border-radius:8px}.logout:hover{background:#f0ede4;color:var(--red)}

  main{overflow:auto;padding:22px 26px 40px}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .topbar h2{margin:0;font-size:22px;letter-spacing:-.4px}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .top-actions{display:flex;gap:8px;align-items:center}
  .btn{background:var(--accent);color:#fff;border-radius:11px;padding:9px 15px;font-weight:600;font-size:13px;
    box-shadow:var(--shadow);transition:.15s}
  .btn:hover{background:var(--accent-ink)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--accent);background:#fff}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}

  /* ---------- Bento ---------- */
  .bento{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;grid-auto-rows:minmax(108px,auto)}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;position:relative;overflow:hidden}
  .tile .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .tile .big{font-size:30px;font-weight:700;letter-spacing:-1px;margin-top:auto;line-height:1}
  .tile .sm{font-size:12px;color:var(--muted);margin-top:4px}
  .tile.span2{grid-column:span 2}.tile.span2r{grid-row:span 2}.tile.span4{grid-column:span 4}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .chip.g{background:var(--green-bg);color:#1f7a3f}.chip.r{background:var(--red-bg);color:#b13b37}
  .chip.a{background:var(--amber-bg);color:#a86a14}.chip.b{background:#eaf1fb;color:#2f5fa8}
  .dot{width:8px;height:8px;border-radius:50%}.dot.g{background:var(--green)}.dot.r{background:var(--red)}.dot.a{background:var(--amber)}
  .occ-bars{display:flex;gap:6px;align-items:flex-end;height:54px;margin-top:auto}
  .occ-bars .b{flex:1;border-radius:5px 5px 2px 2px;background:#eee;position:relative}
  .mini-list{margin-top:10px;display:flex;flex-direction:column;gap:8px;overflow:auto}
  .mini-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:7px 0;border-top:1px solid var(--line)}
  .mini-row:first-child{border-top:none}
  .muted{color:var(--muted)}

  /* ---------- Map ---------- */
  .map-wrap{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  .map-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .map-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:6px}
  .map-canvas{position:relative;height:520px;background:
    radial-gradient(circle at 30% 30%, #eef3ec, #f6f4ee 60%);
    background-image:linear-gradient(rgba(0,0,0,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.025) 1px,transparent 1px);
    background-size:34px 34px;overflow:hidden;cursor:default;touch-action:none}
  .path{position:absolute;left:0;right:0;top:48%;height:40px;background:rgba(180,160,120,.18);transform:rotate(-3deg)}
  .ger{position:absolute;width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    flex-direction:column;font-weight:700;font-size:13px;color:#fff;cursor:grab;user-select:none;
    box-shadow:0 4px 10px rgba(0,0,0,.14);border:3px solid rgba(255,255,255,.7);transition:box-shadow .15s,transform .05s}
  .ger small{font-size:9.5px;font-weight:600;opacity:.92}
  .ger.available{background:radial-gradient(circle at 35% 30%,#5cc47e,#2faa5a)}
  .ger.occupied{background:radial-gradient(circle at 35% 30%,#e7726e,#d9534f)}
  .ger.cleaning{background:radial-gradient(circle at 35% 30%,#f0b760,#e8a13c)}
  .ger:active{cursor:grabbing}
  .ger.sel{outline:3px solid var(--ink);outline-offset:3px}
  .ger.rec{animation:pulse 1.1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,125,111,.5)}70%{box-shadow:0 0 0 14px rgba(46,125,111,0)}100%{box-shadow:0 0 0 0 rgba(46,125,111,0)}}
  .ger .feat{position:absolute;bottom:-7px;display:flex;gap:2px}
  .ger .feat i{width:7px;height:7px;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.12)}

  .side-panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    padding:16px;display:flex;flex-direction:column;gap:12px;min-height:200px}
  .panel-title{font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:space-between}
  .q-card{border:1px solid var(--line);border-radius:13px;padding:11px 12px;transition:.15s;cursor:pointer}
  .q-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .q-card.act{border-color:var(--accent);background:#f4faf8}
  .q-top{display:flex;justify-content:space-between;align-items:center}
  .q-name{font-weight:600}.q-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .src{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
  .src.operator{background:#eef0fb;color:#3a51b5}.src.phone{background:#eaf7f0;color:#1f8a55}
  .src.walkin{background:#fdf0e6;color:#c47a2a}.src.website{background:#f0ecfb;color:#6b46c1}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid var(--line)}
  .kv:first-child{border-top:none}.kv b{font-weight:600}
  .rec-box{background:#f0faf7;border:1px dashed var(--accent);border-radius:12px;padding:11px}
  .rec-box .rt{font-size:12px;color:var(--accent-ink);font-weight:700;margin-bottom:5px}

  /* ---------- Tables ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);
    border-bottom:1px solid var(--line);background:#fbfaf6;font-weight:700}
  td{padding:11px 14px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fbfaf6}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px}
  .tag.paid{background:var(--green-bg);color:#1f7a3f}.tag.advance{background:var(--amber-bg);color:#a86a14}
  .tag.pending{background:var(--red-bg);color:#b13b37}.tag.confirmed{background:#eaf1fb;color:#2f5fa8}
  .tag.checked_in{background:var(--green-bg);color:#1f7a3f}.tag.checked_out{background:#eee;color:#666}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .card-pad{padding:18px}
  .sec-title{font-weight:700;font-size:15px;margin:0 0 4px}
  .bar-row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12px}
  .bar-row .nm{width:78px;color:var(--muted)}
  .bar-track{flex:1;background:#f0ede4;border-radius:7px;height:18px;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),#3fa18f)}
  .bar-row .vl{width:96px;text-align:right;font-weight:600}

  .form-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  input,select{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .deny{padding:60px;text-align:center;color:var(--muted)}
  .deny .lock{font-size:40px;margin-bottom:10px}
  .feat-tags{display:flex;gap:6px;flex-wrap:wrap}
  .feat-tags .ft{font-size:11px;background:#f0ede4;border-radius:7px;padding:3px 8px;color:#5a564e}
  .status-cycle{display:flex;gap:6px;margin-top:4px}
  .sc-btn{flex:1;border:1px solid var(--line);border-radius:9px;padding:7px;font-size:12px;font-weight:600;text-align:center}
  .sc-btn.on{color:#fff;border-color:transparent}.sc-btn.on.available{background:var(--green)}
  .sc-btn.on.occupied{background:var(--red)}.sc-btn.on.cleaning{background:var(--amber)}
  .badge-soft{font-size:11px;color:var(--muted);background:#f0ede4;padding:3px 8px;border-radius:7px}
  .ph{border:1px dashed var(--line);border-radius:14px;padding:30px;text-align:center;color:var(--muted)}
</style>
</head>
<body>

<div class="lang-pill">
  <button id="lang-en" class="on" onclick="setLang('en')">EN</button>
  <button id="lang-mn" onclick="setLang('mn')">MN</button>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="brand"><div class="logo"></div><h1>GerOS</h1></div>
    <p id="login-sub">Camp management, simplified. Pick a user to sign in.</p>
    <div class="roles" id="role-grid"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <aside>
      <div class="side-brand"><div class="logo"></div><b>GerOS</b></div>
      <nav id="nav"></nav>
      <div class="nav-sp"></div>
      <div class="userbox">
        <div class="who">
          <div class="avatar" id="u-av">A</div>
          <div><div class="nm" id="u-nm">Admin</div><div class="rl" id="u-rl">Administrator</div></div>
        </div>
        <button class="logout" onclick="logout()" id="logout-btn">Sign out</button>
      </div>
    </aside>
    <main id="main"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   GerOS — interactive prototype (Day 1)
   Single file, no dependencies. Data shapes mirror the
   PocketBase schema in /backend so this is a migration path.
   ============================================================ */

/* ---------- i18n ---------- */
const I18N = {
  en:{
    tagline:"Camp management, simplified. Pick a user to sign in.",

    party:"Зочид", nights:"Хоног", channel:"Суваг", guest:"Зочин", capacity:"Багтаамж",
    features:"Онцлог", status:"Төлөв", currentGuest:"Одоогийн зочин", noGuest:"Хоосон — сул",
    stove:"Зуух", ensuite:"Угаалгын өрөө", view:"Үзэмж", heating:"Халаалт", ref:"Дугаар", operator:"Оператор",
    amount:"Дүн", payStatus:"Төлбөр", dates:"Огноо", invoice:"Нэхэмжлэх", paid:"Төлсөн", advance:"Урьдчилгаа",
    pending:"Хүлээгдэж буй", confirmed:"Баталгаажсан", checked_in:"Бүртгэгдсэн", checked_out:"Гарсан",

    seasonReport:"Улирлын эцсийн тайлан", export:"Татах", date:"Огноо", user:"Хэрэглэгч", action:"Үйлдэл",
    detail:"Дэлгэрэнгүй", time:"Цаг", recommend:"Санал болгосон", reason:"Шалтгаан", movedGer:"Гэр зөөсөн",
    statusChanged:"Төлөв өөрчилсөн", assigned:"Захиалга хуваарилсан", addedTxn:"Гүйлгээ нэмсэн",
    noAccess:"Танд энэ хэсэгт хандах эрх алга.", contractOk:"Гэрээ байгуулсан", contractNone:"Гэрээгүй",
    totalRev:"Нийт орлого", bookingsCount:"Захиалга", restaurant:"Ресторан", groceries:"Хүнсний бараа",

    todayArr:"Өнөөдрийн ирэлт", gerCol:"Гэр", roomsFor:"Тохирох", waste:"илүү ор",

  }
};
let LANG = "en";
const t = k => (I18N[LANG][k] ?? k);

/* ---------- Users / roles ---------- */
const USERS = [
  {id:"u1", name:"B. Bat-Erdene", role:"admin",   label:{en:"Administrator",mn:"Админ"},     desc:{en:"Full access",mn:"Бүрэн эрх"}},
  {id:"u2", name:"S. Oyun",       role:"manager", label:{en:"Manager",mn:"Менежер"},        desc:{en:"Ops + finance",mn:"Үйл ажиллагаа"}},
  {id:"u3", name:"D. Naran",      role:"kitchen", label:{en:"Kitchen",mn:"Тогооч"},          desc:{en:"Kitchen only",mn:"Зөвхөн гал тогоо"}},

];
const PERMS = {
  admin:  ["dashboard","gers","bookings","operators","finance","kitchen","reports","audit","settings"],
  manager:["dashboard","gers","bookings","operators","finance","kitchen","reports","audit"],
  kitchen:["dashboard","kitchen"],
  worker: ["dashboard","gers","bookings"]

let drag=null;
function startDrag(e,g,el){
  e.preventDefault();
  const cv=document.getElementById("canvas").getBoundingClientRect();
  drag={g,el,offX:e.clientX-cv.left-g.x,offY:e.clientY-cv.top-g.y,moved:false,cv};
  el.setPointerCapture(e.pointerId);
  el.onpointermove=ev=>{
    let nx=ev.clientX-drag.cv.left-drag.offX, ny=ev.clientY-drag.cv.top-drag.offY;
    nx=Math.max(0,Math.min(nx,drag.cv.width-74)); ny=Math.max(0,Math.min(ny,drag.cv.height-74));
    g.x=Math.round(nx); g.y=Math.round(ny); el.style.left=g.x+"px"; el.style.top=g.y+"px"; drag.moved=true;
  };
  el.onpointerup=ev=>{
    el.onpointermove=null; el.onpointerup=null;
    if(drag.moved){ logAudit("movedGer",g.code,`x:${g.x}, y:${g.y}`); toast(`${g.code} ${t('movedGer').toLowerCase()}`); }
    else { SELGER=g.id; renderMapSide(); drawGers(); }
    drag=null;
  };
}

/* ---- SMART ALLOCATION (pure) ---- */
function recommendGers(b){
  const avail=STATE.gers.filter(g=>g.status==="available");
  // 1) single ger that fits with least spare capacity
  const singles=avail.filter(g=>g.capacity>=b.party).sort((a,c)=>a.capacity-c.capacity);
  if(singles.length){ const g=singles[0];
    return {gers:[g],waste:g.capacity-b.party,reason:LANG==="mn"?`Нэг гэр, хамгийн тохирох багтаамж`:`Single ger, tightest fit`}; }
  // 2) multi-ger: pick largest first, then nearest neighbours, until party covered
  const pool=[...avail].sort((a,c)=>c.capacity-a.capacity);
  if(!pool.length) return {gers:[],waste:0,reason:""};
  const chosen=[pool[0]]; let cap=pool[0].capacity;
  const rest=pool.slice(1);
  while(cap<b.party && rest.length){
    // nearest to the cluster centroid
    const cx=chosen.reduce((s,g)=>s+g.x,0)/chosen.length, cy=chosen.reduce((s,g)=>s+g.y,0)/chosen.length;
    rest.sort((a,c)=>(Math.hypot(a.x-cx,a.y-cy))-(Math.hypot(c.x-cx,c.y-cy)));
    const next=rest.shift(); chosen.push(next); cap+=next.capacity;
  }
  return {gers:chosen,waste:Math.max(0,cap-b.party),
    reason:LANG==="mn"?`${chosen.length} зэргэлдээ гэр`:`${chosen.length} adjacent gers, grouped`};
}
function assign(bid){
  const b=STATE.bookings.find(x=>x.id===bid); const r=recommendGers(b);
  if(!r.gers.length){ toast("No fit"); return; }
  r.gers.forEach(g=>{ g.status="occupied"; g.currentBooking=b.ref; });
  b.status="confirmed"; b.gers=r.gers.map(g=>g.id);
  // auto invoice
  STATE.invoices.unshift({id:"i"+Date.now(),number:"INV-2026-"+(92+STATE.invoices.length),
    booking:b.ref,operator:b.operator,amount:b.amount,status:b.pay,issued:"2026-06-03"});
  logAudit("assigned",`${b.ref} → ${r.gers.map(g=>g.code).join("+")}`,`${t("invoice")} auto-generated · ${fmt(b.amount)}`);
  SELBOOK=null; toast(`${b.ref} → ${r.gers.map(g=>g.code).join(" + ")} ✓`);
  renderMapSide(); drawGers();
}

/* ---------- Finance ---------- */
function vFinance(){
  const maxv=Math.max(...REV_SERIES.map(r=>r.rev));
  const bars=REV_SERIES.map(r=>`
    <div class="bar-row"><span class="nm">${r.m}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${r.rev/maxv*100}%"></div></div>
      <span class="vl">₮${r.rev}M</span></div>
    <div class="bar-row"><span class="nm muted">${t("expense").toLowerCase()}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${r.exp/maxv*100}%;background:#d9b48a"></div></div>
      <span class="vl muted">₮${r.exp}M</span></div>`).join("");
  const inv=STATE.invoices;
  const sum=s=>inv.filter(i=>i.status===s).reduce((a,i)=>a+i.amount,0);
  const invRows=inv.map(i=>`<tr><td><b>${i.number}</b></td><td>${i.booking}</td>
    <td>${i.operator?STATE.operators.find(o=>o.id===i.operator).name:"—"}</td>
    <td>${fmt(i.amount)}</td><td><span class="tag ${i.status}">${t(i.status)}</span></td><td class="muted">${i.issued}</td></tr>`).join("");
  document.getElementById("main").innerHTML=head(t("finance"),"",`<button class="btn ghost sm">${t("export")} CSV</button>`)
  +`<div class="grid3" style="margin-bottom:16px">
      <div class="tile"><div class="lbl">${t("paid")}</div><div class="big" style="color:var(--green)">${fmt(sum("paid"))}</div></div>
      <div class="tile"><div class="lbl">${t("advance")}</div><div class="big" style="color:var(--amber)">${fmt(sum("advance"))}</div></div>
      <div class="tile"><div class="lbl">${t("pending")}</div><div class="big" style="color:var(--red)">${fmt(sum("pending"))}</div></div>
    </div>
    <div class="grid2">
      <div class="panel card-pad"><div class="sec-title">${t("revExpense")}</div><div style="margin-top:10px">${bars}</div></div>
      <div class="panel"><div class="card-pad" style="padding-bottom:0"><div class="sec-title">${t("invStatus")}</div></div>
        <table style="margin-top:8px"><tr><th>${t("invoice")}</th><th>${t("ref")}</th><th>${t("operator")}</th><th>${t("amount")}</th><th>${t("status")}</th><th>${t("date")}</th></tr>${invRows}</table></div>
    </div>`;
}

/* ---------- Kitchen ---------- */
function vKitchen(){
  const inc=STATE.kitchen.filter(k=>k.type==="income").reduce((s,k)=>s+k.amount,0);
  const exp=STATE.kitchen.filter(k=>k.type==="expense").reduce((s,k)=>s+k.amount,0);
  const rows=STATE.kitchen.map(k=>`<tr><td class="muted">${k.date}</td>
    <td><span class="chip ${k.type==='income'?'g':'r'}">${t(k.type)}</span></td>
    <td>${t(k.category)||k.category}</td><td>${k.note}</td>
    <td style="font-weight:600;color:${k.type==='income'?'var(--green)':'var(--red)'}">${k.type==='income'?'+':'−'}${fmt(k.amount)}</td>
    <td class="muted">${k.user}</td></tr>`).join("");
  document.getElementById("main").innerHTML=head(t("kitchen"),t("kitchenPnl"),"")
  +`<div class="grid3" style="margin-bottom:16px">
      <div class="tile"><div class="lbl">${t("income")}</div><div class="big" style="color:var(--green)">${fmt(inc)}</div></div>
      <div class="tile"><div class="lbl">${t("expense")}</div><div class="big" style="color:var(--red)">${fmt(exp)}</div></div>
      <div class="tile"><div class="lbl">${t("profit")}</div><div class="big">${fmt(inc-exp)}</div></div>
    </div>
    <div class="panel">
      <div class="card-pad" style="padding-bottom:12px;border-bottom:1px solid var(--line)">
        <div class="sec-title">${t("quickAdd")}</div>
        <div class="form-row">
          <select id="kt"><option value="income">${t("income")}</option><option value="expense">${t("expense")}</option></select>
          <select id="kc"><option value="restaurant">${t("restaurant")}</option><option value="groceries">${t("groceries")}</option><option value="wages">${t("wages")}</option><option value="utilities">${t("utilities")}</option></select>
          <input id="kn" placeholder="${t("note")}" style="flex:1;min-width:140px"/>
          <input id="ka" type="number" placeholder="₮" style="width:120px"/>
          <button class="btn sm" onclick="addKitchen()">${t("add")}</button>
        </div>
      </div>
      <table><tr><th>${t("date")}</th><th>${t("category")}</th><th>${t("category")}</th><th>${t("note")}</th><th>${t("amount")}</th><th>${t("user")}</th></tr>${rows}</table>
    </div>`;
}
function addKitchen(){
  const type=document.getElementById("kt").value, cat=document.getElementById("kc").value;
  const note=document.getElementById("kn").value||"—", amt=parseInt(document.getElementById("ka").value||"0",10);
  if(!amt){ toast("Enter amount"); return; }
  STATE.kitchen.unshift({id:"k"+Date.now(),date:"2026-06-03",type,category:cat,note,amount:amt,user:CURRENT.name});
  logAudit("addedTxn",`Kitchen ${type} ${fmt(amt)}`,note);
  toast(`${t("add")} ✓`); vKitchen();
}

/* ---------- Reports ---------- */
function vReports(){
  const totalRev=REV_SERIES.reduce((s,r)=>s+r.rev,0), totalExp=REV_SERIES.reduce((s,r)=>s+r.exp,0);
  const chan={};STATE.bookings.forEach(b=>chan[b.channel]=(chan[b.channel]||0)+1);
  ["operator","website","phone","walkin"].forEach(c=>chan[c]=chan[c]||0);
  const cmax=Math.max(...Object.values(chan),1);
  const chanBars=Object.entries(chan).map(([k,v])=>`
    <div class="bar-row"><span class="nm">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/cmax*100}%"></div></div><span class="vl">${v}</span></div>`).join("");
  document.getElementById("main").innerHTML=head(t("reports"),t("seasonReport"),`<button class="btn ghost sm">${t("export")} PDF</button>`)
  +`<div class="grid3" style="margin-bottom:16px">
      <div class="tile"><div class="lbl">${t("totalRev")} 2026</div><div class="big" style="color:var(--green)">₮${totalRev}M</div></div>
      <div class="tile"><div class="lbl">${t("expense")}</div><div class="big" style="color:var(--red)">₮${totalExp}M</div></div>
      <div class="tile"><div class="lbl">${t("profit")}</div><div class="big">₮${totalRev-totalExp}M</div><div class="sm"><span class="chip g">${Math.round((totalRev-totalExp)/totalRev*100)}% margin</span></div></div>
    </div>
    <div class="grid2">
      <div class="panel card-pad"><div class="sec-title">${t("byChannel")}</div><div style="margin-top:12px">${chanBars}</div></div>
      <div class="panel card-pad"><div class="sec-title">${t("seasonReport")}</div>
        <div class="kv" style="margin-top:8px"><span>Occupancy avg</span><b>71%</b></div>
        <div class="kv"><span>Total bookings</span><b>37</b></div>
        <div class="kv"><span>Avg booking value</span><b>${fmt(4900000)}</b></div>
        <div class="kv"><span>Top operator</span><b>Nomadic Trails GmbH</b></div>
        <div class="kv"><span>Kitchen net</span><b>${fmt(11800000)}</b></div>
        <div class="ph" style="margin-top:14px">📄 ${t("export")}: PDF / Excel / CSV — Phase 2 one-click export</div>
      </div>
    </div>`;
}

/* ---------- Audit ---------- */
function vAudit(){
  const rows=STATE.audit.map(a=>`<tr><td class="muted" style="white-space:nowrap">${a.ts}</td>
    <td><span class="avatar" style="width:22px;height:22px;font-size:10px;display:inline-flex">${a.user.split(" ").pop()[0]}</span> ${a.user}</td>
    <td><span class="badge-soft">${a.role}</span></td>
    <td><b>${t(a.action)||a.action}</b></td><td>${a.entity}</td><td class="muted">${a.detail}</td></tr>`).join("");
  document.getElementById("main").innerHTML=head(t("audit"),`${STATE.audit.length} ${LANG==="mn"?"бичлэг":"entries"}`,"")
  +`<div class="panel"><table>
    <tr><th>${t("time")}</th><th>${t("user")}</th><th>Role</th><th>${t("action")}</th><th>Entity</th><th>${t("detail")}</th></tr>${rows}</table></div>`;
}

      <div class="kv"><span>${USERS[1].name}</span><span class="badge-soft">manager</span></div>
      <div class="kv"><span>${USERS[2].name}</span><span class="badge-soft">kitchen</span></div>

/* ---------- language switch ---------- */
function setLang(l){
  LANG=l;
  document.getElementById("lang-en").classList.toggle("on",l==="en");
  document.getElementById("lang-mn").classList.toggle("on",l==="mn");
  if(CURRENT){ document.getElementById("u-rl").textContent=CURRENT.label[LANG]; buildNav(); render(); }
  else renderRoles();
}

/* ---------- boot ---------- */
renderRoles();
</script>
